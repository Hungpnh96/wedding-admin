<div class="tab-content-wrapper">
    <div class="section-card">
        <div class="section-header d-flex justify-content-between align-items-center">
            <h5><i class="fas fa-images me-2"></i>Quản lý thư viện ảnh</h5>
            <div>
                <button class="btn btn-info btn-sm me-2" onclick="refreshGallery()">
                    <i class="fas fa-sync me-1"></i>Làm mới
                </button>
                <button class="btn btn-custom btn-sm" onclick="triggerFileInput()">
                <i class="fas fa-plus me-2"></i>Thêm ảnh
            </button>
            </div>
          </div>
          <div class="section-body">
              <!-- Hidden file input for upload -->
              <input type="file" id="galleryFileInput" accept="image/*" multiple style="display: none;" onchange="handleMultipleUpload(event)">

            <!-- Gallery Grid -->
            <div class="gallery-container">
                <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery images will be loaded here -->
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyGallery" class="empty-gallery" style="display: none;">
                <i class="fas fa-images fa-4x mb-3"></i>
                <h5>Chưa có ảnh nào</h5>
                <p>Hãy thêm ảnh đầu tiên vào thư viện!</p>
                <button class="btn btn-custom mt-3" onclick="triggerFileInput()">
                    <i class="fas fa-plus me-2"></i>Thêm ảnh đầu tiên
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Gallery management
let galleryImages = [];
let currentUploading = false;

// Initialize gallery
function initializeGalleryPage() {
    console.log('🚀 Initializing gallery page');
    loadGalleryImages();
}

// Load gallery images
async function loadGalleryImages() {
    try {
        console.log('📸 Loading gallery images...');
        
        const response = await fetch(window.location.origin + '/api/data');
        const result = await response.json();
        
        if (result.success && result.data && result.data.gallery) {
            galleryImages = result.data.gallery;
            console.log('📸 Gallery images loaded:', galleryImages);
            renderGallery();
        } else {
            console.log('📭 No gallery images found');
            galleryImages = [];
            renderEmptyState();
        }
    } catch (error) {
        console.error('Error loading gallery images:', error);
        galleryImages = [];
        renderEmptyState();
    }
}

// Render gallery grid
function renderGallery() {
    const grid = document.getElementById('galleryGrid');
    const emptyState = document.getElementById('emptyGallery');
    
    if (!grid) return;
    
    if (galleryImages.length === 0) {
        renderEmptyState();
        return;
    }
    
    // Hide empty state
    if (emptyState) emptyState.style.display = 'none';
    
    grid.innerHTML = galleryImages.map((image, index) => `
        <div class="gallery-item" data-image-id="${image.id || index}">
            <div class="gallery-image">
                <img src="${window.location.origin}${image.src.replace('./', '/')}" alt="${image.alt || 'Gallery image'}" 
                     onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkltYWdlPC90ZXh0Pjwvc3ZnPg=='">
                <div class="gallery-overlay">
                    <div class="gallery-actions">
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteImage('${image.id || index}')" title="Xóa">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="gallery-info">
                <div class="gallery-name">${image.name || `Ảnh ${index + 1}`}</div>
                <div class="gallery-meta">
                    <small class="text-muted">
                        <i class="fas fa-hdd me-1"></i>${formatFileSize(image.size || 0)}
                        <span class="mx-1">•</span>
                        <i class="fas fa-clock me-1"></i>${formatDate(image.uploadedAt || new Date())}
                    </small>
                </div>
            </div>
        </div>
    `).join('');
}

// Render empty state
function renderEmptyState() {
    const grid = document.getElementById('galleryGrid');
    const emptyState = document.getElementById('emptyGallery');
    
    if (grid) grid.innerHTML = '';
    if (emptyState) emptyState.style.display = 'block';
}


// Trigger file input
function triggerFileInput() {
    console.log('🔍 triggerFileInput called');
    const fileInput = document.getElementById('galleryFileInput');
    console.log('🔍 File input element:', fileInput);
    if (fileInput) {
        console.log('✅ Clicking file input...');
        fileInput.click();
    } else {
        console.error('❌ File input not found!');
        Swal.fire({
            icon: 'error',
            title: 'Lỗi!',
            text: 'Không thể tìm thấy file input. Vui lòng refresh trang.',
            timer: 3000
        });
    }
}

// Handle multiple file upload
async function handleMultipleUpload(event) {
    const files = Array.from(event.target.files);
    if (files.length === 0) return;
    
    console.log('📸 Uploading', files.length, 'files');
    
    // Show loading
    Swal.fire({
        title: 'Đang tải ảnh...',
        text: `Đang tải ${files.length} ảnh, vui lòng chờ`,
        allowOutsideClick: false,
        allowEscapeKey: false,
        showConfirmButton: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });
    
    let successCount = 0;
    let errorCount = 0;
    const errorMessages = [];

    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        // Update progress in Swal
        Swal.update({
            title: 'Đang tải ảnh...',
            text: `Đang tải ${i + 1}/${files.length}: ${file.name}`
        });
        try {
            await uploadSingleImage(file);
            successCount++;
        } catch (error) {
            console.error('Upload error for', file.name, ':', error);
            errorMessages.push(`${file.name}: ${error.message}`);
            errorCount++;
        }
        // Delay để tránh rate limit Nginx (2 req/s)
        if (i < files.length - 1) {
            await new Promise(resolve => setTimeout(resolve, 600));
        }
    }
    
    Swal.close();
    
    if (successCount > 0) {
        const errorNote = errorMessages.length > 0
            ? `<br><small style="color:#856404">⚠️ ${errorCount} ảnh lỗi:<br>${errorMessages.join('<br>')}</small>`
            : '';
        Swal.fire({
            icon: errorMessages.length > 0 ? 'warning' : 'success',
            title: 'Hoàn thành',
            html: `Đã tải <b>${successCount}</b> ảnh thành công${errorNote}`,
            confirmButtonText: 'OK'
        });
        setTimeout(loadGalleryImages, 500);
    } else {
        Swal.fire({
            icon: 'error',
            title: 'Lỗi!',
            html: `Không thể tải ảnh nào:<br><small style="color:#666">${errorMessages.join('<br>')}</small>`,
            confirmButtonText: 'OK'
        });
    }
    
    // Clear file input
    event.target.value = '';
}

// Compress image on browser before upload (max 1600px, JPEG quality 0.82)
async function compressImage(file, maxWidth = 1600, quality = 0.82) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                let { width, height } = img;
                if (width > maxWidth) {
                    height = Math.round(height * maxWidth / width);
                    width = maxWidth;
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                canvas.toBlob(
                    (blob) => {
                        if (!blob) { reject(new Error('Không thể nén ảnh')); return; }
                        const compressed = new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' });
                        console.log(`🗜️ ${file.name}: ${(file.size/1024/1024).toFixed(1)}MB → ${(compressed.size/1024/1024).toFixed(1)}MB`);
                        resolve(compressed);
                    },
                    'image/jpeg',
                    quality
                );
            };
            img.onerror = () => reject(new Error('Không thể đọc file ảnh'));
            img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('Không thể đọc file'));
        reader.readAsDataURL(file);
    });
}

// Upload single image
async function uploadSingleImage(file) {
    // Validate file
    if (!file.type.startsWith('image/')) {
        throw new Error('File không phải là ảnh');
    }

    // Compress trước khi upload (giảm dung lượng, tránh lỗi Nginx 413)
    let uploadFile = file;
    try {
        uploadFile = await compressImage(file);
    } catch (compressErr) {
        console.warn('⚠️ Không thể nén ảnh, dùng file gốc:', compressErr.message);
    }

    if (uploadFile.size > 10 * 1024 * 1024) {
        throw new Error(`File vẫn quá lớn sau khi nén (${(uploadFile.size/1024/1024).toFixed(1)}MB, tối đa 10MB)`);
    }

    const formData = new FormData();
    formData.append('file', uploadFile);
    formData.append('type', 'gallery');
    
    const response = await fetch(window.location.origin + '/api/upload', {
        method: 'POST',
        body: formData
    });

    if (response.status === 413) {
        throw new Error('File quá lớn, server từ chối. Kiểm tra client_max_body_size trong Nginx');
    }
    if (!response.ok) {
        throw new Error(`Lỗi server (${response.status}). Vui lòng thử lại`);
    }

    const contentType = response.headers.get('content-type') || '';
    if (!contentType.includes('application/json')) {
        throw new Error('Server trả về lỗi không xác định. Kiểm tra Nginx config');
    }

    const result = await response.json();

    if (!result.success) {
        throw new Error(result.message || 'Upload thất bại');
    }
    
    // Add to gallery
    const newImage = {
        id: Date.now().toString(),
        src: result.url,
        name: file.name,
        size: uploadFile.size,
        uploadedAt: new Date().toISOString(),
        visible: true
    };
    
    galleryImages.unshift(newImage);
    
    // Save to server
    await saveGalleryToServer();
    
    return newImage;
}

// Save gallery to server
async function saveGalleryToServer() {
    try {
        const response = await fetch(window.location.origin + '/api/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gallery: galleryImages })
        });
        
        if (!response.ok) {
            throw new Error(`Lưu gallery thất bại (HTTP ${response.status})`);
        }
    } catch (error) {
        console.error('Error saving gallery:', error);
        throw error;
    }
}



// Delete image
async function deleteImage(imageId) {
    const image = galleryImages.find(img => img.id === imageId);
    if (!image) return;
    
    const result = await Swal.fire({
        title: 'Xác nhận xóa',
        text: `Xóa ảnh "${image.name || 'không tên'}"?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Xóa',
        cancelButtonText: 'Hủy'
    });
    
    if (result.isConfirmed) {
        try {
            // Delete file from server
            await deleteImageFile(image.src);
            
            // Remove from array
            galleryImages = galleryImages.filter(img => img.id !== imageId);
            
            // Save to server
            await saveGalleryToServer();
            
            // Refresh display
            renderGallery();
            
            Swal.fire({
                icon: 'success',
                title: 'Thành công!',
                text: 'Đã xóa ảnh',
                timer: 1500,
                showConfirmButton: false
            });
        } catch (error) {
            console.error('Error deleting image:', error);
            Swal.fire({
                icon: 'error',
                title: 'Lỗi!',
                text: 'Không thể xóa ảnh',
                confirmButtonText: 'OK'
            });
        }
    }
}


// Delete image file from server
async function deleteImageFile(imageSrc) {
    try {
        // Extract filename from path
        const filename = imageSrc.split('/').pop();
        
        const response = await fetch(window.location.origin + '/api/delete-file', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: filename, type: 'gallery' })
        });
        
        if (!response.ok) {
            throw new Error('Failed to delete file from server');
        }
        
        console.log('File deleted from server:', filename);
    } catch (error) {
        console.error('Error deleting file from server:', error);
        // Don't throw error, just log it - we still want to remove from gallery
    }
}

// Refresh gallery
function refreshGallery() {
    loadGalleryImages();
}

// Helper functions
function formatFileSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('vi-VN');
}

// Export functions
window.initializeGallery = initializeGalleryPage;
window.refreshGallery = refreshGallery;
window.triggerFileInput = triggerFileInput;
window.handleMultipleUpload = handleMultipleUpload;
window.deleteImage = deleteImage;

// Auto-initialize
document.addEventListener('DOMContentLoaded', initializeGalleryPage);
</script>
