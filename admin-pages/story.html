<!-- SweetAlert2 CDN -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<div class="tab-content-wrapper">
    <div class="section-card">
        <div class="section-header d-flex justify-content-between align-items-center">
            <h5><i class="fas fa-book me-2"></i>Quản lý câu chuyện</h5>
            <div class="d-flex align-items-center gap-2">
                <div class="form-check form-switch mb-0 me-2" title="Ẩn/hiện mục câu chuyện trên trang web">
                    <input class="form-check-input" type="checkbox" id="storyVisibilityToggle" checked onchange="toggleStorySectionVisibility(this.checked)">
                    <label class="form-check-label" for="storyVisibilityToggle">Hiển thị</label>
                </div>
                <button class="btn btn-custom btn-sm" onclick="addStory()">
                    <i class="fas fa-plus me-2"></i>Thêm câu chuyện
                </button>
            </div>
        </div>
        <div class="section-body">
            <!-- Stories List -->
            <div id="storiesList">
                <div class="stories-grid" id="storiesGrid">
                    <!-- Stories will be loaded here -->
                </div>
            </div>
            
            <!-- Story Form -->
            <div id="storyForm" class="story-form-container" style="display: none;">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">
                            <i class="fas fa-edit me-2"></i>
                            <span id="storyFormTitle">Thêm câu chuyện mới</span>
                        </h6>
                        <button type="button" class="btn-close" onclick="closeStoryForm()"></button>
                    </div>
                    <div class="card-body">
                        <form id="storyFormElement" onsubmit="handleStorySubmit(event)">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label class="form-label">Mốc sự kiện</label>
                                        <input type="text" class="form-control" id="storyMilestone" 
                                               placeholder="Ví dụ: Ngày gặp nhau lần đầu" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label class="form-label">Tiêu đề</label>
                                        <input type="text" class="form-control" id="storyTitle" 
                                               placeholder="Ví dụ: 💕 Lần đầu gặp mặt" required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-group mb-3">
                                <label class="form-label">Ảnh minh họa</label>
                                <div class="image-upload-area" onclick="document.getElementById('storyImageInput').click()">
                                    <input type="file" id="storyImageInput" accept="image/*" style="display: none;" onchange="handleStoryImageUpload(event)">
                                    <div class="upload-placeholder">
                                        <i class="fas fa-image fa-3x mb-3"></i>
                                        <p>Nhấn để chọn ảnh</p>
                                        <small class="text-muted">JPG, PNG, WebP (Tối đa 5MB)</small>
                                    </div>
                                    <img id="storyImagePreview" class="uploaded-image" style="display: none; width: 100%; height: auto; max-height: 250px; object-fit: contain; border-radius: 12px;">
                                    <div id="storyImageActions" style="display: none; margin-top: 10px; text-align: center;">
                                        <button type="button" class="btn btn-sm btn-danger" onclick="removeStoryImage()">
                                            <i class="fas fa-trash me-1"></i>Xóa ảnh
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-group mb-3">
                                <label class="form-label">Nội dung câu chuyện</label>
                                <textarea class="form-control" id="storyDescription" rows="6" 
                                          placeholder="Viết nội dung câu chuyện của bạn..." required></textarea>
                            </div>
                            
                            <div class="form-group mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="storyVisible" checked>
                                    <label class="form-check-label" for="storyVisible">
                                        Hiển thị trên website
                                    </label>
                                </div>
                            </div>
                            
                            <div class="form-actions">
                                <button type="button" class="btn btn-secondary" onclick="closeStoryForm()">
                                    <i class="fas fa-times me-2"></i>Hủy
                                </button>
                                <button type="submit" class="btn btn-custom">
                                    <i class="fas fa-save me-2"></i>Lưu câu chuyện
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Simple and clean story management
let storyData = [];
let editingStory = null;

// Initialize
function initializeStory() {
    console.log('🚀 Initializing story page');
    console.log('📊 Current storyData:', storyData);
    loadStories();
}

// Load stories from API
async function loadStories() {
    try {
        const response = await fetch(window.location.origin + '/api/data');
        const result = await response.json();
        
        if (result.success && result.data && result.data.story) {
            storyData = result.data.story;
            console.log('📚 Stories loaded:', storyData);
            renderStories();
        } else {
            console.log('📭 No stories found');
            storyData = [];
            renderEmptyState();
        }
    } catch (error) {
        console.error('Error loading stories:', error);
        storyData = [];
        renderEmptyState();
    }
}

// Render stories
function renderStories() {
    const grid = document.getElementById('storiesGrid');
    if (!grid) {
        console.error('❌ storiesGrid not found');
        return;
    }
    
    console.log('🎨 Rendering stories:', storyData.length);
    
    if (storyData.length === 0) {
        renderEmptyState();
        return;
    }
    
    grid.innerHTML = storyData.map((story, index) => `
        <div class="story-card">
            <div class="story-image">
                ${story.src ? `<img src="${window.location.origin}${story.src}" alt="${story.title}">` : '<div class="no-image"><i class="fas fa-image"></i></div>'}
            </div>
            <div class="story-content">
                <h4>${story.title || 'Câu chuyện'}</h4>
                <p class="story-milestone">${story.milestone || ''}</p>
                <p class="story-description">${story.description || ''}</p>
            </div>
            <div class="story-actions">
                <button class="btn btn-sm btn-outline-primary" onclick="editStory('${story.id}')">
                        <i class="fas fa-edit"></i>
                    </button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteStory('${story.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
            </div>
        </div>
    `).join('');
}

// Empty state
function renderEmptyState() {
    const grid = document.getElementById('storiesGrid');
    if (!grid) return;
    
    grid.innerHTML = `
        <div class="empty-stories">
            <i class="fas fa-book-open"></i>
            <h5>Chưa có câu chuyện nào</h5>
            <p>Hãy thêm câu chuyện đầu tiên của bạn!</p>
            <button class="btn btn-custom mt-3" onclick="addStory()">
                <i class="fas fa-plus me-2"></i>Thêm câu chuyện đầu tiên
            </button>
        </div>
    `;
}

// Add new story
function addStory() {
    console.log('➕ Adding new story');
    
    editingStory = null;
    
    // Reset form
    document.getElementById('storyMilestone').value = '';
    document.getElementById('storyTitle').value = '';
    document.getElementById('storyDescription').value = '';
    document.getElementById('storyVisible').checked = true;
    
    // Reset image
    resetImagePreview();
    
    // Update form title
    document.getElementById('storyFormTitle').textContent = 'Thêm câu chuyện mới';
    
    // Show form
    document.getElementById('storyForm').style.display = 'block';
    document.getElementById('storiesList').style.display = 'none';
}

// Edit story
function editStory(storyId) {
    console.log('✏️ Editing story:', storyId);
    
    const story = storyData.find(s => s.id === storyId);
    if (!story) {
        Swal.fire({
            icon: 'error',
            title: 'Lỗi!',
            text: 'Không tìm thấy câu chuyện!',
            confirmButtonText: 'OK'
        });
        return;
    }
    
    editingStory = story;
    
    // Fill form
    document.getElementById('storyMilestone').value = story.milestone || '';
    document.getElementById('storyTitle').value = story.title || '';
    document.getElementById('storyDescription').value = story.description || '';
    document.getElementById('storyVisible').checked = story.visible !== false;
    
    // Handle image
    if (story.src) {
        showImagePreview(`${window.location.origin}${story.src}`);
    } else {
        resetImagePreview();
    }
    
    // Update form title
    document.getElementById('storyFormTitle').textContent = 'Chỉnh sửa câu chuyện';
    
    // Show form
    document.getElementById('storyForm').style.display = 'block';
    document.getElementById('storiesList').style.display = 'none';
}

// Delete story
async function deleteStory(storyId) {
    const story = storyData.find(s => s.id === storyId);
    if (!story) return;
    
    const result = await Swal.fire({
        title: 'Xác nhận xóa',
        text: `Bạn có chắc chắn muốn xóa câu chuyện "${story.title}"?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Xóa',
        cancelButtonText: 'Hủy'
    });
    
    if (!result.isConfirmed) return;
    
    try {
        storyData = storyData.filter(s => s.id !== storyId);
        await saveStories();
        renderStories();
        Swal.fire({
            icon: 'success',
            title: 'Thành công!',
            text: 'Đã xóa câu chuyện!',
            confirmButtonText: 'OK'
        });
    } catch (error) {
        console.error('Error deleting story:', error);
        Swal.fire({
            icon: 'error',
            title: 'Lỗi!',
            text: 'Lỗi khi xóa câu chuyện!',
            confirmButtonText: 'OK'
        });
    }
}

// Close form
function closeStoryForm() {
    document.getElementById('storyForm').style.display = 'none';
    document.getElementById('storiesList').style.display = 'block';
    editingStory = null;
    document.getElementById('storyFormElement').reset();
    resetImagePreview();
}

// Handle form submit
async function handleStorySubmit(event) {
    event.preventDefault();
    console.log('💾 Saving story...');
    
    try {
        const newStoryData = {
            milestone: document.getElementById('storyMilestone').value,
            title: document.getElementById('storyTitle').value,
            description: document.getElementById('storyDescription').value,
            visible: document.getElementById('storyVisible').checked,
            src: getImageSrc(),
            id: editingStory ? editingStory.id : Date.now().toString()
        };
        
        if (!newStoryData.milestone || !newStoryData.title || !newStoryData.description) {
            Swal.fire({
                icon: 'warning',
                title: 'Thiếu thông tin!',
                text: 'Vui lòng điền đầy đủ thông tin bắt buộc!',
                confirmButtonText: 'OK'
            });
            return;
        }
        
        if (editingStory) {
            // Update existing
            const index = storyData.findIndex(s => s.id === editingStory.id);
            if (index !== -1) {
                storyData[index] = { ...storyData[index], ...newStoryData };
            }
        } else {
            // Add new
            storyData.push(newStoryData);
        }
        
        await saveStories();
        renderStories();
        closeStoryForm();
        Swal.fire({
            icon: 'success',
            title: 'Thành công!',
            text: 'Đã lưu câu chuyện!',
            confirmButtonText: 'OK'
        });
        
    } catch (error) {
        console.error('Error saving story:', error);
        Swal.fire({
            icon: 'error',
            title: 'Lỗi!',
            text: 'Lỗi khi lưu câu chuyện!',
            confirmButtonText: 'OK'
        });
    }
}

// Save to server
async function saveStories() {
    const response = await fetch(window.location.origin + '/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ story: storyData })
    });
    
    if (!response.ok) {
        throw new Error('Failed to save stories');
    }
}

// Image upload
async function handleStoryImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    console.log('Uploading:', file.name);
    
    // Show loading
    Swal.fire({
        title: 'Đang upload...',
        text: 'Vui lòng chờ trong giây lát',
        allowOutsideClick: false,
        allowEscapeKey: false,
        showConfirmButton: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });
    
    const formData = new FormData();
    formData.append('file', file);
    formData.append('type', 'story');
    
    try {
        const response = await fetch(window.location.origin + '/api/upload', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        console.log('Upload result:', result);
        
        if (result.success) {
            const imageUrl = `${window.location.origin}${result.url.replace('./', '/')}`;
            showImagePreview(imageUrl);
            
            // Close loading and show success
            Swal.close();
            Swal.fire({
                icon: 'success',
                title: 'Upload thành công!',
                text: 'Ảnh đã được tải lên',
                timer: 1500,
                showConfirmButton: false
            });
        } else {
            Swal.close();
            Swal.fire({
                icon: 'error',
                title: 'Lỗi upload!',
                text: result.message || 'Unknown error',
                confirmButtonText: 'OK'
            });
        }
    } catch (error) {
        console.error('Upload error:', error);
        Swal.close();
        Swal.fire({
            icon: 'error',
            title: 'Lỗi upload!',
            text: error.message,
            confirmButtonText: 'OK'
        });
    }
}

// Remove image
function removeStoryImage() {
    console.log('Removing story image...');
    resetImagePreview();
}

// Helper functions
function showImagePreview(imageUrl) {
    const preview = document.getElementById('storyImagePreview');
    const placeholder = document.querySelector('.upload-placeholder');
    const actions = document.getElementById('storyImageActions');
    
    preview.src = imageUrl;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    actions.style.display = 'block';
}

function resetImagePreview() {
    const preview = document.getElementById('storyImagePreview');
    const placeholder = document.querySelector('.upload-placeholder');
    const actions = document.getElementById('storyImageActions');
    const fileInput = document.getElementById('storyImageInput');
    
    preview.style.display = 'none';
    preview.src = '';
    placeholder.style.display = 'flex';
    actions.style.display = 'none';
    fileInput.value = '';
}

function getImageSrc() {
    const preview = document.getElementById('storyImagePreview');
    if (preview && preview.src && preview.style.display !== 'none') {
        let src = preview.src;
        if (src.includes(window.location.origin)) {
            src = src.replace(window.location.origin, '');
        }
        return src;
    }
    return '';
}

// Export functions
window.initializeStory = initializeStory;
window.addStory = addStory;
window.editStory = editStory;
window.deleteStory = deleteStory;
window.closeStoryForm = closeStoryForm;
window.handleStorySubmit = handleStorySubmit;
window.handleStoryImageUpload = handleStoryImageUpload;
window.removeStoryImage = removeStoryImage;

// Debug function
window.debugStories = function() {
    console.log('🔍 Debug Stories:');
    console.log('📊 storyData:', storyData);
    console.log('🎯 storiesGrid element:', document.getElementById('storiesGrid'));
    console.log('📚 Current stories count:', storyData.length);
    loadStories();
};

// Force load stories function
window.forceLoadStories = function() {
    console.log('🔄 Force loading stories...');
    loadStories();
};

// Auto-initialize
document.addEventListener('DOMContentLoaded', initializeStory);

// Also try to initialize immediately if DOM is already ready
if (document.readyState === 'loading') {
    console.log('📚 DOM still loading, waiting for DOMContentLoaded');
} else {
    console.log('📚 DOM already ready, initializing immediately');
    setTimeout(initializeStory, 100);
}
</script>
