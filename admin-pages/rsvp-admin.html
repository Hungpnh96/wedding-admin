<div class="tab-content-wrapper">
    <!-- Stats cards -->
    <div class="row g-3 mb-4" id="rsvp-stats-row">
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card text-center border-0 shadow-sm h-100">
                <div class="card-body py-3">
                    <div class="fs-4 fw-bold text-primary" id="stat-total">-</div>
                    <div class="small text-muted">Tổng</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card text-center border-0 shadow-sm h-100">
                <div class="card-body py-3">
                    <div class="fs-4 fw-bold text-success" id="stat-attending">-</div>
                    <div class="small text-muted">Sẽ đến</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="card text-center border-0 shadow-sm h-100">
                <div class="card-body py-3">
                    <div class="fs-4 fw-bold text-danger" id="stat-not-attending">-</div>
                    <div class="small text-muted">Không đến</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card text-center border-0 shadow-sm h-100">
                <div class="card-body py-3">
                    <div class="fs-4 fw-bold text-info" id="stat-groom">-</div>
                    <div class="small text-muted">Nhà trai</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card text-center border-0 shadow-sm h-100">
                <div class="card-body py-3">
                    <div class="fs-4 fw-bold text-warning" id="stat-bride">-</div>
                    <div class="small text-muted">Nhà gái</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-12 col-sm-6 col-md-3">
                    <label class="form-label small fw-semibold mb-1">Bên</label>
                    <select id="rsvp-filter-side" class="form-select form-select-sm">
                        <option value="">Tất cả</option>
                        <option value="groom">Nhà trai</option>
                        <option value="bride">Nhà gái</option>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-md-3">
                    <label class="form-label small fw-semibold mb-1">Tham dự</label>
                    <select id="rsvp-filter-attending" class="form-select form-select-sm">
                        <option value="">Tất cả</option>
                        <option value="1">Có đến</option>
                        <option value="0">Không đến</option>
                    </select>
                </div>
                <div class="col-12 col-sm-6 col-md-4">
                    <label class="form-label small fw-semibold mb-1">Tìm kiếm</label>
                    <input type="text" id="rsvp-search" class="form-control form-control-sm" placeholder="Tên, SĐT...">
                </div>
                <div class="col-12 col-sm-6 col-md-2">
                    <button class="btn btn-success btn-sm w-100" onclick="exportRsvp()">
                        <i class="fas fa-file-csv me-1"></i> Xuất CSV
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle" id="rsvp-table">
                    <thead class="table-light">
                        <tr>
                            <th class="px-3 py-2" style="width:50px">STT</th>
                            <th class="px-3 py-2">Họ tên</th>
                            <th class="px-3 py-2">SĐT</th>
                            <th class="px-3 py-2 text-center">Tham dự</th>
                            <th class="px-3 py-2 text-center">Bên</th>
                            <th class="px-3 py-2 text-center">Số người</th>
                            <th class="px-3 py-2">Sự kiện</th>
                            <th class="px-3 py-2">Thời gian</th>
                            <th class="px-3 py-2 text-center" style="width:70px">Xóa</th>
                        </tr>
                    </thead>
                    <tbody id="rsvp-table-body">
                        <tr>
                            <td colspan="9" class="text-center py-4 text-muted">
                                <i class="fas fa-spinner fa-spin me-2"></i>Đang tải...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Empty state -->
            <div id="rsvp-empty" class="text-center py-5" style="display:none">
                <i class="fas fa-clipboard-list fa-3x text-muted mb-3"></i>
                <p class="text-muted mb-0">Chưa có xác nhận tham dự nào.</p>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var _rsvpAllData = [];

    function initializeRsvpAdmin() {
        loadRsvpData();

        document.getElementById('rsvp-filter-side').addEventListener('change', applyRsvpFilters);
        document.getElementById('rsvp-filter-attending').addEventListener('change', applyRsvpFilters);
        document.getElementById('rsvp-search').addEventListener('input', applyRsvpFilters);
    }

    function loadRsvpData() {
        fetch('/api/rsvp')
            .then(function(res) { return res.json(); })
            .then(function(result) {
                if (!result.success) {
                    showRsvpError('Không thể tải dữ liệu.');
                    return;
                }
                _rsvpAllData = result.data || [];

                // Update stats
                var stats = result.stats || {};
                document.getElementById('stat-total').textContent = stats.total || 0;
                document.getElementById('stat-attending').textContent = stats.attending || 0;
                document.getElementById('stat-not-attending').textContent = stats.not_attending || 0;
                var bySide = stats.by_side || {};
                document.getElementById('stat-groom').textContent = bySide.groom || 0;
                document.getElementById('stat-bride').textContent = bySide.bride || 0;

                applyRsvpFilters();
            })
            .catch(function() {
                showRsvpError('Lỗi kết nối đến server.');
            });
    }

    function applyRsvpFilters() {
        var sideVal = document.getElementById('rsvp-filter-side').value;
        var attendingVal = document.getElementById('rsvp-filter-attending').value;
        var searchVal = (document.getElementById('rsvp-search').value || '').trim().toLowerCase();

        var filtered = _rsvpAllData.filter(function(item) {
            if (sideVal && item.side !== sideVal) return false;
            if (attendingVal !== '') {
                var expected = attendingVal === '1';
                if (item.attending !== expected) return false;
            }
            if (searchVal) {
                var name = (item.name || '').toLowerCase();
                var phone = (item.phone || '').toLowerCase();
                if (name.indexOf(searchVal) === -1 && phone.indexOf(searchVal) === -1) return false;
            }
            return true;
        });

        renderRsvpTable(filtered);
    }

    function renderRsvpTable(data) {
        var tbody = document.getElementById('rsvp-table-body');
        var empty = document.getElementById('rsvp-empty');

        if (!data || data.length === 0) {
            tbody.innerHTML = '';
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';

        var rows = data.map(function(item, index) {
            var attendingBadge = item.attending
                ? '<span class="badge bg-success">Có</span>'
                : '<span class="badge bg-danger">Không</span>';
            var sideName = item.side === 'groom' ? 'Nhà trai' : 'Nhà gái';
            var createdAt = formatRsvpDate(item.created_at);
            var escapedName = escapeHtml(item.name || '');
            var escapedPhone = escapeHtml(item.phone || '-');
            var escapedEvent = escapeHtml(item.event_name || '-');

            return '<tr>' +
                '<td class="px-3">' + (index + 1) + '</td>' +
                '<td class="px-3 fw-semibold">' + escapedName + '</td>' +
                '<td class="px-3">' + escapedPhone + '</td>' +
                '<td class="px-3 text-center">' + attendingBadge + '</td>' +
                '<td class="px-3 text-center"><span class="badge bg-secondary">' + sideName + '</span></td>' +
                '<td class="px-3 text-center">' + (item.guest_count || 1) + '</td>' +
                '<td class="px-3">' + escapedEvent + '</td>' +
                '<td class="px-3 text-nowrap">' + createdAt + '</td>' +
                '<td class="px-3 text-center">' +
                    '<button class="btn btn-outline-danger btn-sm" onclick="deleteRsvp(' + item.id + ')" title="Xoa">' +
                        '<i class="fas fa-trash-alt"></i>' +
                    '</button>' +
                '</td>' +
            '</tr>';
        });

        tbody.innerHTML = rows.join('');
    }

    function deleteRsvp(id) {
        if (!confirm('Bạn có chắc muốn xóa xác nhận này không?')) return;

        fetch('/api/rsvp/' + id, { method: 'DELETE' })
            .then(function(res) { return res.json(); })
            .then(function(result) {
                if (result.success) {
                    _rsvpAllData = _rsvpAllData.filter(function(item) { return item.id !== id; });
                    applyRsvpFilters();
                    // Reload to refresh stats
                    loadRsvpData();
                } else {
                    alert(result.message || 'Có lỗi xảy ra khi xóa.');
                }
            })
            .catch(function() {
                alert('Lỗi kết nối, vui lòng thử lại!');
            });
    }

    function exportRsvp() {
        window.location.href = '/api/rsvp/export';
    }

    function formatRsvpDate(dateStr) {
        if (!dateStr) return '-';
        try {
            var d = new Date(dateStr);
            var pad = function(n) { return n < 10 ? '0' + n : n; };
            return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear() +
                   ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
        } catch(e) {
            return dateStr;
        }
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function showRsvpError(msg) {
        document.getElementById('rsvp-table-body').innerHTML =
            '<tr><td colspan="9" class="text-center py-4 text-danger">' +
            '<i class="fas fa-exclamation-triangle me-2"></i>' + escapeHtml(msg) + '</td></tr>';
    }

    // Expose for admin.html initializeTabContent
    window.initializeRsvpAdmin = initializeRsvpAdmin;
    window.deleteRsvp = deleteRsvp;
    window.exportRsvp = exportRsvp;

    // Auto-initialize if DOM is ready
    if (document.readyState !== 'loading') {
        initializeRsvpAdmin();
    } else {
        document.addEventListener('DOMContentLoaded', initializeRsvpAdmin);
    }
})();
</script>
