<style>
.wf-field { margin-bottom: 10px; }
.wf-field label {
    display: block;
    font-weight: 600;
    margin-bottom: 3px;
    color: #7a3e3e;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}
.wf-field .form-control,
.wf-field select {
    width: 100%;
    padding: 7px 11px;
    border: 1.5px solid #e8b4b8;
    border-radius: 7px;
    font-size: 13px;
    background: #fff;
    color: #4a2c2c;
    transition: border-color 0.2s;
    outline: none;
    box-sizing: border-box;
}
.wf-field .form-control:focus,
.wf-field select:focus {
    border-color: #c97b7b;
    box-shadow: 0 0 0 2px rgba(201,123,123,0.15);
}
.wf-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.rsvp-radio-row {
    display: flex; gap: 12px; flex-wrap: wrap; margin-top: 3px;
}
.rsvp-radio-row label {
    display: flex; align-items: center; gap: 5px;
    font-weight: 500; color: #4a2c2c; cursor: pointer;
    font-size: 13px; margin-bottom: 0; text-transform: none; letter-spacing: 0;
}
.rsvp-radio-row input[type="radio"] { accent-color: #c97b7b; width: 14px; height: 14px; cursor: pointer; }
.rsvp-event-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 3px; }
.rsvp-event-pills label {
    display: flex; align-items: center; gap: 4px;
    font-weight: 500; color: #4a2c2c; cursor: pointer;
    font-size: 12px; margin-bottom: 0;
    text-transform: none; letter-spacing: 0;
    background: #fff5f5; border: 1.5px solid #e8b4b8;
    border-radius: 16px; padding: 3px 10px; transition: all 0.15s;
}
.rsvp-event-pills label:hover { border-color: #c97b7b; background: #fff0f0; }
.rsvp-event-pills input[type="checkbox"] { accent-color: #c97b7b; width: 13px; height: 13px; cursor: pointer; }

/* Wishes suggest */
.ws-textarea-wrap { position: relative; }
.ws-suggest-btn {
    position: absolute; right: 8px; bottom: 8px;
    background: none; border: none; cursor: pointer;
    color: #c97b7b; padding: 0; opacity: 0.65; transition: opacity 0.15s;
}
.ws-suggest-btn:hover { opacity: 1; }
.ws-suggest-panel {
    display: none; position: absolute; bottom: 34px; right: 0;
    width: 280px; background: #fff; border: 1.5px solid #e8b4b8;
    border-radius: 9px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    z-index: 99; overflow: hidden;
}
.ws-suggest-panel input {
    width: 100%; border: none; border-bottom: 1px solid #f0d0d0;
    padding: 7px 10px; font-size: 12px; outline: none; box-sizing: border-box; color: #4a2c2c;
}
.ws-suggest-list { max-height: 180px; overflow-y: auto; list-style: none; margin: 0; padding: 0; }
.ws-suggest-list li a {
    display: block; padding: 7px 10px; font-size: 12px; color: #4a2c2c;
    cursor: pointer; border-bottom: 1px solid #fdf0f0; transition: background 0.1s; text-decoration: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ws-suggest-list li a:hover { background: #fff5f5; color: #c97b7b; }

/* Thank you */
.wf-thankyou { text-align: center; padding: 16px 8px; animation: wfFadeIn 0.4s ease; }
.wf-thankyou .ty-icon { font-size: 32px; margin-bottom: 8px; }
.wf-thankyou h4 { color: #c97b7b; font-size: 16px; margin-bottom: 6px; font-family: inherit; }
.wf-thankyou p { color: #7a3e3e; font-size: 13px; margin: 0; }
@keyframes wfFadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* Wishes list */
.wishes-feed { margin-top: 16px; border-top: 1px dashed #f0c0c0; padding-top: 14px; max-height: 340px; overflow-y: auto; }
.wishes-feed-title { text-align: center; color: #c97b7b; font-size: 12px; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.wish-item {
    padding: 10px 12px; margin-bottom: 8px;
    background: #fff9f9; border: 1px solid #f0d0d0; border-radius: 8px;
}
.wish-item .wi-name { font-weight: 600; color: #7a3e3e; font-size: 12px; }
.wish-item .wi-from { font-size: 11px; color: #b07070; margin-left: 4px; }
.wish-item .wi-text { color: #4a2c2c; font-size: 13px; margin-top: 4px; line-height: 1.45; }
.wish-item .wi-time { font-size: 11px; color: #c0a0a0; margin-top: 4px; }

/* Two-panel layout */
.wedding-dual-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
}
.wedding-panel {
    background: #fff;
    border: 1.5px solid #e8b4b8;
    border-radius: 12px;
    padding: 18px 16px;
}
.wedding-panel-title {
    text-align: center;
    color: #c97b7b;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px dashed #f0c0c0;
}
.wf-submit-btn {
    width: 100%; padding: 9px; border-radius: 8px;
    background: #c97b7b; color: #fff; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background 0.2s; margin-top: 12px;
}
.wf-submit-btn:hover { background: #b86767; }
.wf-submit-btn:disabled { background: #dba8a8; cursor: not-allowed; }

@media (max-width: 600px) {
    .wedding-dual-wrap { grid-template-columns: 1fr; }
    .ws-suggest-panel { width: 100%; right: 0; left: 0; }
}
</style>

<section id="rsvp" class="section-bg-color extra-padding-section editable-parent scroll-to">

                                <p id="rsvp-ty-msg">Hẹn gặp trong ngày vui!</p>
                            </div>

                        <!-- ===== PANEL 2: GỬI LỜI CHÚC ===== -->
                        <div class="wedding-panel">
                            <div class="wedding-panel-title">Gửi Lời Chúc</div>

                            <div id="wishes-form-wrap">
                                <form id="wishes-send-form" novalidate>

                                                </svg>

                    </div>

</section>

<script>
(function() {
    var SUGGESTIONS = [
        'Chúc mừng hạnh phúc! Chúc hai bạn trăm năm hạnh phúc!',
        'Chúc mừng ngày trọng đại tới hai bạn. Hạnh phúc bền lâu và trọn vẹn nhé!',
        'Chúc mừng hạnh phúc hai bạn. Chúc hai bạn bên nhau đầu bạc răng long, sớm có thiên thần nhỏ nhé!',
        'Chúc hai bạn ngày vui hạnh phúc. Hãy yêu thương nhau thật nhiều và sống thật hạnh phúc nha!',
        'Chúc hai bạn sớm có con đàn cháu đống, cửa nhà lúc nào cũng đầm ấm, yên vui nhé!',
        'Thật vui vì cuối cùng ngày này cũng tới với bạn. Tôi thành tâm chúc hai bạn thật nhiều hạnh phúc và sống đời vui vẻ cùng nhau mãi mãi!',
        'Một chương mới đã mở ra với hai bạn rồi. Tôi mong cuộc sống mới của cả hai sẽ tràn ngập hy vọng, hạnh phúc và niềm vui!',
        'Chúc đôi trai tài gái sắc hạnh phúc trọn vẹn, luôn yêu thương nhau thật nhiều!',
        'Chia vui cùng bạn trong ngày trọng đại này. Cầu mong cuộc sống sau này của 2 vợ chồng thật thuận hòa, may mắn, làm ăn phát tài nha.',
        'Tôi mong tình yêu của hai bạn thật bền chặt, gắn bó để xây dựng tổ ấm yên bình, hạnh phúc!',
        'Nơi nào có yêu thương nơi đó chắc chắn hạnh phúc. Hai bạn đã tìm được nơi đủ đầy yêu thương rồi, hãy cùng nắm tay nhau đi hết cuộc đời nhé!',
        'Gửi lời chúc mừng chân thành nhất tới bạn của tôi. Chúc hai bạn một cuộc sống thật tuyệt vời, hòa thuận, gắn bó son sắt, thủy chung, hạnh phúc lâu dài.',
        'Hôm nay là ngày vui của anh chị và cũng là ngày em rất hạnh phúc. Chúc anh chị mãi yêu thương nhau như bây giờ và đạt được mọi ước nguyện.',
        'Chúc anh/chị/em trăm năm hạnh phúc, thuận vợ thuận chồng.',
        'Hôm nay chú rể đẹp trai, cô dâu xinh gái. Chúc mừng ngày thành hôn hai bạn tôi!'
    ];

    function esc(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtTime(ds) {
        if (!ds) return '';
        var d = new Date(ds);
        return isNaN(d.getTime()) ? ds : d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
    }

    // --- Suggest panel ---
    function renderSuggestions(q) {
        var list = document.getElementById('ws-suggest-list');
        if (!list) return;
        var items = q ? SUGGESTIONS.filter(function(s){ return s.toLowerCase().indexOf(q.toLowerCase()) >= 0; }) : SUGGESTIONS;
        list.innerHTML = items.map(function(s){
            return '<li><a onclick="window._selectWish(this)" data-t="' + esc(s) + '">' + esc(s) + '</a></li>';
        }).join('');
    }
    window._selectWish = function(el) {
        var ta = document.getElementById('wishes-content');
        if (ta) ta.value = el.dataset.t;
        document.getElementById('ws-suggest-panel').style.display = 'none';
    };

    function initSuggest() {
        var btn = document.getElementById('ws-suggest-toggle');
        var panel = document.getElementById('ws-suggest-panel');
        var search = document.getElementById('ws-suggest-search');
        if (!btn || !panel) return;
        renderSuggestions('');
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var vis = panel.style.display === 'block';
            panel.style.display = vis ? 'none' : 'block';
            if (!vis) { search.value = ''; renderSuggestions(''); search.focus(); }
        });
        search.addEventListener('input', function(){ renderSuggestions(this.value); });
        document.addEventListener('click', function(e) {
            if (!panel.contains(e.target) && e.target !== btn) panel.style.display = 'none';
        });
    }

    // --- RSVP events ---
    function loadRsvpEvents() {
        if (typeof window.apiCall !== 'function') { setTimeout(loadRsvpEvents, 300); return; }
        window.apiCall('/data').then(function(r){ return r.json(); }).then(function(result) {
            if (result && result.data && Array.isArray(result.data.events) && result.data.events.length > 0) {
                var c = document.getElementById('rsvp-events-container');
                if (!c) return;
                c.innerHTML = result.data.events.map(function(ev) {
                    var n = typeof ev === 'string' ? ev : (ev.name || ev.title || '');
                    return n ? '<label><input type="checkbox" name="rsvp_event" value="' + esc(n) + '" checked> ' + esc(n) + '</label>' : '';
                }).join('');
            }
        }).catch(function(){});
    }

    // --- RSVP submit ---
    function initRsvp() {
        var form = document.getElementById('rsvp-attend-form');
        if (!form) return;
        loadRsvpEvents();
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            var name = (document.getElementById('rsvp-name').value || '').trim();
            if (!name) { alert('Vui lòng nhập họ và tên!'); document.getElementById('rsvp-name').focus(); return; }
            var radio = document.querySelector('input[name="attending"]:checked');
            var attending = radio ? radio.value === 'yes' : true;
            var phone = (document.getElementById('rsvp-phone').value || '').trim();
            var side = document.getElementById('rsvp-side').value;
            var guests = parseInt(document.getElementById('rsvp-guests').value) || 1;
            var events = Array.from(document.querySelectorAll('input[name="rsvp_event"]:checked')).map(function(c){ return c.value; });
            var eventName = events.join(', ') || 'Tiệc Cưới';
            var btn = document.getElementById('rsvp-submit-btn');
            btn.disabled = true; btn.textContent = 'Đang gửi...';
            fetch('/api/rsvp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, phone: phone, attending: attending, side: side, guest_count: guests, message: '', event_name: eventName })
            })
            .then(function(r){ return r.json(); })
            .then(function(data) {
                if (data.success) {
                    try { sessionStorage.setItem('rsvpName', name); } catch(e) {}
                    document.getElementById('rsvp-form-container').style.display = 'none';
                    var ty = document.getElementById('rsvp-thankyou');
                    ty.style.display = 'block';
                    document.getElementById('rsvp-ty-title').textContent = attending ? 'Cảm ơn bạn!' : 'Đã nhận được!';
                    document.getElementById('rsvp-ty-msg').textContent = attending
                        ? 'Chúng tôi rất vui khi bạn sẽ tham dự!'
                        : 'Cảm ơn bạn đã thông báo. Chúc bạn mọi điều tốt lành!';
                    var wn = document.getElementById('wishes-name');
                    if (wn && !wn.value) wn.value = name;
                } else {
                    alert(data.message || 'Có lỗi xảy ra, vui lòng thử lại!');
                    btn.disabled = false; btn.textContent = 'Xác nhận tham dự';
                }
            })
            .catch(function() {
                alert('Không thể kết nối server, vui lòng thử lại!');
                btn.disabled = false; btn.textContent = 'Xác nhận tham dự';
            });
        });
    }

    // --- Wishes list ---
    function loadWishes() {
        fetch('/api/blessing/latest?limit=5')
        .then(function(r){ return r.json(); })
        .then(function(data) {
            var c = document.getElementById('wishes-items-list');
            if (!c) return;
            var list = data.data || data.blessings || [];
            if (!data.success || !list.length) {
                c.innerHTML = '<p style="text-align:center;color:#c0a0a0;font-size:12px;padding:6px 0;">Chưa có lời chúc nào.</p>';
                return;
            }
            c.innerHTML = list.map(function(b) {
                return '<div class="wish-item"><span class="wi-name">' + esc(b.name) + '</span><span class="wi-from">· ' + esc(b.from) + '</span>' +
                    '<div class="wi-text">' + esc(b.content) + '</div>' +
                    '<div class="wi-time">' + fmtTime(b.created_at) + '</div></div>';
            }).join('');
        })
        .catch(function() {
            var c = document.getElementById('wishes-items-list');
            if (c) c.innerHTML = '<p style="text-align:center;color:#c0a0a0;font-size:12px;">Không thể tải.</p>';
        });
    }

    // --- Wishes submit ---
    function initWishes() {
        var form = document.getElementById('wishes-send-form');
        if (!form) return;
        loadWishes();
        initSuggest();
        try {
            var saved = sessionStorage.getItem('rsvpName');
            var wn = document.getElementById('wishes-name');
            if (saved && wn && !wn.value) wn.value = saved;
        } catch(e) {}
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            var name = (document.getElementById('wishes-name').value || '').trim();
            var content = (document.getElementById('wishes-content').value || '').trim();
            var from = document.getElementById('wishes-from').value;
            if (!name) { alert('Vui lòng nhập họ và tên!'); document.getElementById('wishes-name').focus(); return; }
            if (!content) { alert('Vui lòng nhập lời chúc!'); document.getElementById('wishes-content').focus(); return; }
            var btn = document.getElementById('wishes-submit-btn');
            btn.disabled = true; btn.textContent = 'Đang gửi...';
            fetch('/api/blessing/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, from: from, content: content })
            })
            .then(function(r){ return r.json(); })
            .then(function(data) {
                if (data.success) {
                    form.style.display = 'none';
                    document.getElementById('wishes-thankyou').style.display = 'block';
                    setTimeout(loadWishes, 600);
                } else {
                    alert(data.message || 'Có lỗi xảy ra, vui lòng thử lại!');
                    btn.disabled = false; btn.textContent = 'Gửi lời chúc';
                }
            })
            .catch(function() {
                alert('Không thể kết nối server, vui lòng thử lại!');
                btn.disabled = false; btn.textContent = 'Gửi lời chúc';
            });
        });
    }

    window.resetWishesForm = function() {
        var form = document.getElementById('wishes-send-form');
        if (form) { form.reset(); form.style.display = 'block'; }
        var ty = document.getElementById('wishes-thankyou');
        if (ty) ty.style.display = 'none';
        var btn = document.getElementById('wishes-submit-btn');
        if (btn) { btn.disabled = false; btn.textContent = 'Gửi lời chúc'; }
    };

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function(){ initRsvp(); initWishes(); });
    } else {
        initRsvp(); initWishes();
    }
})();
</script>
